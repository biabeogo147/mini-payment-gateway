services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mini_payment_gateway}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for sandbox}
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sandbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mini_payment_gateway}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-sandbox}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required for sandbox}
      INTERNAL_AUTH_SECRET: ${INTERNAL_AUTH_SECRET:?INTERNAL_AUTH_SECRET is required for sandbox}
      INTERNAL_AUTH_COOKIE_NAME: ${INTERNAL_AUTH_COOKIE_NAME:-mini_payment_gateway_internal_session}
      INTERNAL_AUTH_TTL_SECONDS: ${INTERNAL_AUTH_TTL_SECONDS:-43200}
      INTERNAL_AUTH_COOKIE_SECURE: ${INTERNAL_AUTH_COOKIE_SECURE:-false}
      MERCHANT_AUTH_SECRET: ${MERCHANT_AUTH_SECRET:?MERCHANT_AUTH_SECRET is required for sandbox}
      MERCHANT_AUTH_COOKIE_NAME: ${MERCHANT_AUTH_COOKIE_NAME:-mini_payment_gateway_merchant_session}
      MERCHANT_AUTH_TTL_SECONDS: ${MERCHANT_AUTH_TTL_SECONDS:-43200}
      MERCHANT_AUTH_COOKIE_SECURE: ${MERCHANT_AUTH_COOKIE_SECURE:-false}
      PROVIDER_CALLBACK_SECRETS: ${PROVIDER_CALLBACK_SECRETS:?PROVIDER_CALLBACK_SECRETS is required for sandbox}
    depends_on:
      postgres:
        condition: service_healthy
    command: bash -lc "uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${BACKEND_BIND_ADDR:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-sandbox}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required for sandbox}
      WORKER_ENABLED: ${WORKER_ENABLED:-true}
      WORKER_LOOP_INTERVAL_SECONDS: ${WORKER_LOOP_INTERVAL_SECONDS:-15}
      PAYMENT_EXPIRATION_BATCH_LIMIT: ${PAYMENT_EXPIRATION_BATCH_LIMIT:-200}
      WEBHOOK_DELIVERY_BATCH_LIMIT: ${WEBHOOK_DELIVERY_BATCH_LIMIT:-100}
      WORKER_PAYMENT_EXPIRATION_ENABLED: ${WORKER_PAYMENT_EXPIRATION_ENABLED:-true}
      WORKER_WEBHOOK_DELIVERY_ENABLED: ${WORKER_WEBHOOK_DELIVERY_ENABLED:-true}
      WORKER_LOG_LEVEL: ${WORKER_LOG_LEVEL:-INFO}
      WORKER_HEARTBEAT_PATH: ${WORKER_HEARTBEAT_PATH:-/tmp/worker.heartbeat}
    depends_on:
      postgres:
        condition: service_healthy
    command: bash -lc "python -m app.worker.main"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/worker.heartbeat"]
      interval: 20s
      timeout: 5s
      retries: 6

  demo-merchant:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      GATEWAY_BASE_URL: http://backend:8000
      DEMO_PROVIDER_ID: ${DEMO_PROVIDER_ID:-simulator}
      PROVIDER_CALLBACK_SECRETS: ${PROVIDER_CALLBACK_SECRETS:?PROVIDER_CALLBACK_SECRETS is required for sandbox}
      DEMO_MODE: ${DEMO_MODE:-true}
    depends_on:
      backend:
        condition: service_healthy
    command: bash -lc "uvicorn demo_merchant.main:app --host 0.0.0.0 --port 8100"
    ports:
      - "${DEMO_MERCHANT_BIND_ADDR:-127.0.0.1}:${DEMO_MERCHANT_PORT:-8100}:8100"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8100/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  ops-dashboard:
    build:
      context: .
      dockerfile: apps/ops-dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${OPS_DASHBOARD_BIND_ADDR:-127.0.0.1}:${OPS_DASHBOARD_PORT:-4173}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 6

  merchant-dashboard:
    build:
      context: .
      dockerfile: apps/merchant-dashboard/Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${MERCHANT_DASHBOARD_BIND_ADDR:-127.0.0.1}:${MERCHANT_DASHBOARD_PORT:-4174}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  sandbox-postgres-data:
